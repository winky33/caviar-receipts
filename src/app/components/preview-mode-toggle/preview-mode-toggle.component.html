<div class="preview-mode-toggle" role="group" aria-label="Preview mode">
  <button
    type="button"
    class="preview-mode-toggle__button"
    [class.preview-mode-toggle__button--active]="mode() === 'item-list'"
    [attr.aria-pressed]="mode() === 'item-list'"
    (click)="selectMode('item-list')"
    data-testid="preview-mode-item-list"
  >
    Item List View
  </button>

  <button
    type="button"
    class="preview-mode-toggle__button"
    [class.preview-mode-toggle__button--active]="mode() === 'receipt'"
    [attr.aria-pressed]="mode() === 'receipt'"
    (click)="selectMode('receipt')"
    data-testid="preview-mode-receipt"
  >
    Receipt View
  </button>
</div>
