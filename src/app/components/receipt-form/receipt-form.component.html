<form class="receipt-form" [formGroup]="form()" novalidate>
  <section class="receipt-form__card">
    <div class="receipt-form__topbar">
      <div>
        <p class="receipt-form__eyebrow">Form Studio</p>
        <h2>Receipt Details</h2>
      </div>

      <button type="button" class="button button--primary" (click)="requestDownload()" data-testid="download-png">
        Download PNG
      </button>
    </div>

    <div class="receipt-form__grid">
      <label class="field field--wide">
        <span class="field__label">Receipt Number</span>
        <input
          type="text"
          formControlName="receiptNo"
          name="receiptNo"
          maxlength="20"
          data-testid="receipt-no"
        />
      </label>

      <label class="field field--temporal">
        <span class="field__label">Date</span>
        <span class="field__control">
          <input type="date" formControlName="date" name="receiptDate" data-testid="receipt-date" />
        </span>
      </label>

      <label class="field field--temporal">
        <span class="field__label">Time</span>
        <span class="field__control">
          <input type="time" formControlName="time" name="receiptTime" data-testid="receipt-time" />
        </span>
      </label>
    </div>

    <section class="receipt-form__section">
      <div class="receipt-form__section-header">
        <div>
          <p class="receipt-form__eyebrow">Line Items</p>
          <h3>Services</h3>
        </div>

        <button type="button" class="button button--secondary" (click)="requestAddItem()" data-testid="add-item">
          Add Item
        </button>
      </div>

      <app-receipt-item-table [itemGroups]="itemGroups()" (removeItem)="requestRemoveItem($event)" />
    </section>

    <label class="field">
      <span class="field__label">Footer Message</span>
      <textarea
        rows="6"
        formControlName="footerMessage"
        name="footerMessage"
        data-testid="footer-message"
      ></textarea>
    </label>
  </section>
</form>
